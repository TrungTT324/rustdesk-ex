name: Build RustDesk Android (Custom for 10k devices)

on:
  workflow_dispatch:

env:
  RUST_VERSION: "1.75"           # Giữ đúng theo file gốc (Sciter + ABI compatibility)
  FLUTTER_VERSION: "3.24.5"
  NDK_VERSION: "r28c"
  CARGO_NDK_VERSION: "3.1.2"

jobs:
  build-android-arm64:
    runs-on: ubuntu-24.04          # Giống file gốc
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake curl gcc-multilib g++-multilib \
            libclang-dev llvm-dev nasm pkg-config openjdk-17-jdk-headless

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }} --locked

      - name: Restore / Build Rust Library (the official way)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # Tái hiện chính xác cách gốc của RustDesk
          ./flutter/ndk_arm64.sh

          # Copy .so vào vị trí Flutter Android project
          mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
          cp ./target/aarch64-linux-android/release/liblibrustdesk.so \
             ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so

          # Copy libc++_shared.so (rất quan trọng)
          cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so \
             ./flutter/android/app/src/main/jniLibs/arm64-v8a/

      - name: Build APK (arm64 only - nhanh & đủ dùng cho hầu hết thiết bị)
        working-directory: flutter
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          flutter pub get
          # Tăng memory Gradle (tránh OOM)
          sed -i "s/org.gradle.jvmargs=-Xmx.*/org.gradle.jvmargs=-Xmx4g/g" android/gradle.properties
          
          flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-arm64-release
          path: flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30