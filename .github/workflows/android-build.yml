name: Build RustDesk Android (Follow Original)

on:
  workflow_dispatch:

env:
  # Copy chuẩn từ file gốc của bạn
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION: "15.0.6"
  NDK_VERSION: "r28c"
  CARGO_NDK_VERSION: "3.1.2"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Quan trọng: Cài đặt LLVM đúng phiên bản 15.0.6 như file gốc
      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      # Build phần Rust (như cách build.py làm)
      - name: Build Rust Library
        run: |
          cargo ndk -t aarch64-linux-android build --features flutter,hwcodec --release

      - name: Build Android APK
        run: |
          cd flutter
          flutter build apk --release --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-release.apk
          path: flutter/build/app/outputs/flutter-apk/app-release.apk